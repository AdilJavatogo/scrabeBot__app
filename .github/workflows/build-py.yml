name: Build and Push Python Application

on:
  push:
    branches: [ "main" ] # husk også pull request
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: adiljavatogo/scrabe-bot

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: adiljavatogo # det er hardcodede, skal laves om senere
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile 
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Pub/Sub node er opdateret
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UPDATE_PUB_SUB_TOKEN }}
          repository: adiljavatogo/robomonitor
          event-type: pub/sub_image_updated
          client-payload: '{"image_tag": "latest"}'
